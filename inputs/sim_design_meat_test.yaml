analysis_name: Meat
iteration_n: 1
iteration_n_final: 2
clusternumber: 5 # explicit parallelisation
clusternumber_export: 2 # NEW: number of clusters for export_summaries
n_cpus: 1 # implicit parallelisation
logs: yes
export_xps: yes
keep_lifecourse: yes
export_PARF: no
'n': 75000
n_synthpop_aggregation: 2 # number of synthpops to aggregate together
# n_primers: 10 # better be some multiple of n_synthpop_aggregation
init_year_long: 2013 # 2008 to 2020 but be careful with max lags
sim_horizon_max: 2045 # population projections do not support longer horizon
init_year_intv: 2025 # Set intervention start year
discount_rate: 0.03 # set discount rate for costs and QALYs
ageL: 30
ageH: 90
apply_RR_to_mrtl2: yes # Is disease mortality influenced by exposures like incidence? NOTE it affects nonmodelled as well
model_trends_in_residual_incd: no # Model trends in non attributable incidence? (NOTE implementation needs further refinement)
init_ftlt_calibration: yes # NEW: Indicator whether case fatality is calibrated at all
mortality_calibration: yes # NEW: Activate or deactivate mortality calibration to FDM forecast. Conditional on CF calibration
calibrate_incd_prb_to_init_year: yes # NEW: Activate calibration of incidence probability to inital year incidence (needed when modeling many risk factors!)
diseases:
- name: t2dm
  friendly_name: T2DM
  meta:
    incidence:
      type: 2
      can_recur: no
    diagnosis:
      type: 1
      probability: 1
      duration_distr: GPO
      mm_wt: 0.0
    mortality:
      type: 1
      code: 4
  notes: .na
- name: chd
  friendly_name: CHD
  meta:
    incidence:
      type: 3 # incidence depends on disease
      influenced_by_disease_name: t2dm
      can_recur: no
    diagnosis:
      type: 1
      probability: 1
      duration_distr: NBI
      mm_wt: 0.49
    mortality:
      type: 3
      influenced_by_disease_name: t2dm
      code: 2
  notes: .na
- name: stroke
  friendly_name: Stroke
  meta:
    incidence:
      type: 3
      influenced_by_disease_name: t2dm
      can_recur: no
    diagnosis:
      type: 1
      probability: 1
      duration_distr: PIG
      mm_wt: 0.8
    mortality:
      type: 3
      influenced_by_disease_name: t2dm
      code: 3
  notes: .na
- name: nonmodelled
  friendly_name: nonmodelled
  meta:
    incidence:
      type: Universal
    diagnosis:
      type: ~ # NULL
    mortality:
      type: 3 # influenced by
      influenced_by_disease_name: t2dm
      code: 1
  notes: .na
maxlag: 10
jumpiness: 1.0 # increase for more erratic jumps in trajectories
decision_aid: 0.8
stochastic: yes
kismet: yes
validation: no # or yes. Note, no yes/no
max_prvl_for_outputs: 2 # duration 1 is incidence and 2 is prevalence
iteration_n_max: 1000
output_dir: /mnt/Storage_1/IMPACT_Storage/Meat/outputs
synthpop_dir: /mnt/Storage_1/IMPACT_Storage/Meat/inputs/synthpop
scenarios: ''
cols_for_output:
- pid # NEED TO be 1st (perhaps not anymore)
- year
- mc
- age
- sex
- wt
- processed_meat_curr_xps
- red_meat_curr_xps
- white_meat_curr_xps
- fish_curr_xps
- processed_meat_delta_xps
- red_meat_delta_xps
- white_meat_delta_xps
- fish_delta_xps
- processed_meat_curr_ghg
- red_meat_curr_ghg
- white_meat_curr_ghg
- fish_curr_ghg
- processed_meat_curr_water
- red_meat_curr_water
- white_meat_curr_water
- fish_curr_water
- processed_meat_curr_land
- red_meat_curr_land
- white_meat_curr_land
- fish_curr_land
- processed_meat_delta_ghg
- red_meat_delta_ghg
- white_meat_delta_ghg
- fish_delta_ghg
- processed_meat_delta_water
- red_meat_delta_water
- white_meat_delta_water
- fish_delta_water
- processed_meat_delta_land
- red_meat_delta_land
- white_meat_delta_land
- fish_delta_land
strata_for_output:
- scenario
- year
- agegrp
- sex
exposures:
- age
- sex
- processed_meat
- red_meat

